name: V-Shop Voucher AI CI Pipeline

on:
  push:
    branches: [ main ] # Tự động chạy mỗi khi push code lên nhánh main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Unit Tests
        run: mvn test 
        # Lệnh này sẽ kiểm tra code. Nếu test fail, GitHub sẽ đánh ĐỎ và dừng tại đây.

      - name: Package Release Candidate
        if: success() # CHỈ CHẠY khi bước trên thành công (XANH)
        run: |
          mvn package
          echo "Đã đóng gói Bản ứng viên phát hành (Release Candidate) thành công!"
